<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">math-008 similar-triangles</title>
  <desc id="desc">Two similar triangles with corresponding side and area labels.</desc>
  <rect width="640" height="360" rx="18" fill="#ffffff"/>
  <rect x="16" y="16" width="608" height="328" rx="14" fill="#fffafa" stroke="#e7d3d5" stroke-width="2"/>
  
  <polygon points="130,250 245,250 162,126" fill="#ffffff" stroke="#5c0a14" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="350,260 540,260 405,78" fill="#f3e6e8" stroke="#5c0a14" stroke-width="4" stroke-linejoin="round"/>
  <text x="185" y="104" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8c5a60">Area = 24</text>
  <text x="445" y="56" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8c5a60">Area = ?</text>
  <text x="185" y="285" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#5c0a14">ABC</text>
  <text x="187" y="242" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="600" fill="#9e2b25">AB = 6</text>
  <text x="445" y="295" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#5c0a14">DEF</text>
  <text x="445" y="252" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="600" fill="#9e2b25">DE = 9</text>
  
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">math-006 rectangle-area</title>
  <desc id="desc">A rectangle with length and width labels.</desc>
  <rect width="640" height="360" rx="18" fill="#ffffff"/>
  <rect x="16" y="16" width="608" height="328" rx="14" fill="#fffafa" stroke="#e7d3d5" stroke-width="2"/>
  
  <rect x="170" y="92" width="300" height="170" rx="6" fill="#f3e6e8" stroke="#5c0a14" stroke-width="4"/>
  <text x="320" y="296" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#9e2b25">8 cm</text>
  <text x="132" y="178" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#9e2b25" transform="rotate(-90 132 178)">5 cm</text>
  <text x="320" y="183" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#8c5a60">Area = length × width</text>
  
</svg>
